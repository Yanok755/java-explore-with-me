name: Build and API Tests

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ stat_svc ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      
      - name: Build with Maven
        run: mvn clean package -DskipTests
      
      - name: Verify JAR files
        run: |
          echo "Checking JAR files..."
          ls -la stats/stats-server/target/
          ls -la ewm-service/target/
          
          if [ ! -f stats/stats-server/target/*.jar ]; then
            echo "Stats server JAR not found!"
            exit 1
          fi
          
          if [ ! -f ewm-service/target/*.jar ]; then
            echo "EWM service JAR not found!"
            exit 1
          fi
      
      - name: Build Docker images
        run: docker compose build
      
      - name: Start Docker Compose
        run: docker compose up -d
      
      - name: Wait for services
        run: |
          chmod +x wait-for-it.sh
          ./wait-for-it.sh stats-server:9090 -t 60
          ./wait-for-it.sh ewm-service:8080 -t 60
      
      - name: Run API tests
        run: |
          echo "Running API tests..."
          
          # Test POST /hit
          echo "Testing POST /hit..."
          curl -X POST http://localhost:9090/hit \
            -H "Content-Type: application/json" \
            -d '{"app":"ewm-main-service","uri":"/events/1","ip":"192.168.0.1","timestamp":"2024-01-01 12:00:00"}' \
            -w "\nHTTP Status: %{http_code}\n"
          
          # Test GET /stats
          echo -e "\nTesting GET /stats..."
          curl "http://localhost:9090/stats?start=2024-01-01%2000:00:00&end=2024-12-31%2023:59:59"
          
          echo -e "\n\nAPI tests completed"
      
      - name: Show logs on failure
        if: failure()
        run: docker compose logs
      
      - name: Stop Docker Compose
        if: always()
        run: docker compose down
